<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Tính Spring Boot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 0;
        }
        .calc-card {
            border-radius: 20px;
            border: none;
            color: #333;
        }
        .btn-custom {
            background-color: #ff6b6b;
            color: white;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-custom:hover { background-color: #ff5252; transform: translateY(-2px); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container"><span class="navbar-brand mb-0 h1">Spring Calculator</span></div>
</nav>

<div class="hero-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card calc-card shadow-lg">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">🧮 Tính Tổng</h3>

                        <form action="/calculate" method="get">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Số thứ nhất (a)</label>
                                <input type="number" name="num1" class="form-control form-control-lg" placeholder="Ví dụ: 10" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Số thứ hai (b)</label>
                                <input type="number" name="num2" class="form-control form-control-lg" placeholder="Ví dụ: 20" required>
                            </div>
                            <button type="submit" class="btn btn-custom btn-lg w-100 mt-3">Thực hiện phép tính</button>
                        </form>

                        <div th:if="${result != null}" class="mt-4 alert alert-info text-center animate__animated animate__fadeIn">
                            <h4 class="mb-0">Kết quả là: <strong th:text="${result}">0</strong></h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center mt-5 p-4 text-muted">
    <p>&copy; 2026 SpringDev - Học về GET Method</p>
</footer>

</body>
</html>
